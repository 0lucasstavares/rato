name: agent-manager

on:
  workflow_run:
    workflows: ["agent-scrum-master"]
    types: [completed]
  schedule:
    - cron: "17 */2 * * *"
  workflow_dispatch:
    inputs:
      role:
        description: Role to run
        required: true
        default: manager
        type: choice
        options:
          - manager
          - cartographer
          - orchestrator

permissions:
  actions: write
  contents: read
  issues: write
  pull-requests: read

concurrency:
  group: agent-manager
  cancel-in-progress: false

jobs:
  manager:
    if: (github.event_name != 'schedule' && github.event_name != 'workflow_run') || (vars.RATO_AUTONOMY == 'on' && (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run agent role
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.RATO_GH_TOKEN || github.token }}
          RATO_AGENT_COMMAND: pwsh ./scripts/agent/run-provider-agent.ps1
          RATO_AGENT_PROVIDER: ${{ secrets.RATO_AGENT_PROVIDER || 'anthropic' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CHATGPT_API_KEY: ${{ secrets.CHATGPT_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          RATO_CLAUDE_AUTH_TOKEN: ${{ secrets.RATO_CLAUDE_AUTH_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          RATO_AGENT_MODEL: ${{ secrets.RATO_AGENT_MODEL || 'gpt-5.4-mini' }}
          RATO_AGENT_FAST_MODEL: ${{ secrets.RATO_AGENT_FAST_MODEL || 'gpt-5-mini' }}
          RATO_AGENT_REVIEW_MODEL: ${{ secrets.RATO_AGENT_REVIEW_MODEL || 'gpt-5.1' }}
          RATO_EMBEDDING_MODEL: ${{ secrets.RATO_EMBEDDING_MODEL || 'text-embedding-3-small' }}
          RATO_AUDIO_MODEL: ${{ secrets.RATO_AUDIO_MODEL || 'whisper-1' }}
        run: |
          $role = "${{ inputs.role }}"
          if (-not $role) { $role = "manager" }
          ./scripts/agent/run-agent-role.ps1 -Role $role
      - name: Queue worker
        if: vars.RATO_AUTONOMY == 'on'
        env:
          GH_TOKEN: ${{ secrets.RATO_GH_TOKEN || github.token }}
        run: gh workflow run agent-worker.yml --repo "$GITHUB_REPOSITORY" --ref main
