name: autonomy-off

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  autonomy-off:
    runs-on: ubuntu-latest
    steps:
      - name: Turn autonomous loops off
        env:
          GH_TOKEN: ${{ secrets.RATO_GH_TOKEN || github.token }}
        run: gh variable set RATO_AUTONOMY --repo "$GITHUB_REPOSITORY" --body off

