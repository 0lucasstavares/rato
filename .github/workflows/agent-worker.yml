name: agent-worker

on:
  workflow_run:
    workflows: ["agent-manager", "agent-reviewer"]
    types: [completed]
  schedule:
    - cron: "41 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  worker:
    if: (github.event_name != 'schedule' && github.event_name != 'workflow_run') || vars.RATO_AUTONOMY == 'on'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        harness: [codex, claude-code]
    timeout-minutes: 30
    name: worker (${{ matrix.harness }})
    concurrency:
      group: agent-worker-${{ matrix.harness }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run worker
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.RATO_GH_TOKEN || github.token }}
          RATO_AGENT_COMMAND: pwsh ./scripts/agent/run-provider-agent.ps1
          RATO_AGENT_HARNESS: ${{ matrix.harness }}
          RATO_AGENT_PROVIDER: ${{ matrix.harness }}
          RATO_AGENT_ID: ${{ matrix.harness }}-worker
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CHATGPT_API_KEY: ${{ secrets.CHATGPT_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          RATO_AGENT_MODEL: ${{ secrets.RATO_AGENT_MODEL || 'gpt-5.1-codex-max' }}
          RATO_AGENT_FAST_MODEL: ${{ secrets.RATO_AGENT_FAST_MODEL || 'gpt-5-mini' }}
          RATO_AGENT_REVIEW_MODEL: ${{ secrets.RATO_AGENT_REVIEW_MODEL || 'gpt-5.1' }}
          RATO_EMBEDDING_MODEL: ${{ secrets.RATO_EMBEDDING_MODEL || 'text-embedding-3-small' }}
          RATO_AUDIO_MODEL: ${{ secrets.RATO_AUDIO_MODEL || 'whisper-1' }}
        run: ./scripts/agent/run-agent-role.ps1 -Role worker

