name: agent-reviewer

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  schedule:
    - cron: "11 */3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: agent-reviewer-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  reviewer:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run reviewer
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.RATO_GH_TOKEN || github.token }}
          RATO_AGENT_COMMAND: pwsh ./scripts/agent/run-provider-agent.ps1
          RATO_AGENT_PROVIDER: ${{ secrets.RATO_AGENT_PROVIDER || 'auto' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CHATGPT_API_KEY: ${{ secrets.CHATGPT_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          RATO_AGENT_MODEL: ${{ secrets.RATO_AGENT_MODEL || 'gpt-5.1-codex-max' }}
          RATO_AGENT_FAST_MODEL: ${{ secrets.RATO_AGENT_FAST_MODEL || 'gpt-5-mini' }}
          RATO_AGENT_REVIEW_MODEL: ${{ secrets.RATO_AGENT_REVIEW_MODEL || 'gpt-5.1' }}
          RATO_EMBEDDING_MODEL: ${{ secrets.RATO_EMBEDDING_MODEL || 'text-embedding-3-small' }}
          RATO_AUDIO_MODEL: ${{ secrets.RATO_AUDIO_MODEL || 'whisper-1' }}
        run: ./scripts/agent/run-agent-role.ps1 -Role reviewer
